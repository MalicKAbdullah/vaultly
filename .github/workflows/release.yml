name: Release

# Builds a signed release APK and publishes it to a GitHub Release.
# Triggers ONLY on version tags and manual dispatch — never on pull
# requests — so fork PRs can never access the signing secrets.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      label:
        description: 'Version label for a manual build (e.g. v1.2.0)'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.3
          channel: stable
          cache: true

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Signing secrets are not configured. Add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_PASSWORD and KEY_ALIAS in repo settings → Secrets."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed APKs
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Collect artifacts
        run: |
          APP="${{ github.event.repository.name }}"
          VER="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.label }}" ]; then
            VER="${{ github.event.inputs.label }}"
          fi
          [ -z "$VER" ] && VER="dev"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${APP}-${VER}-universal.apk"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            f="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            [ -f "$f" ] && cp "$f" "dist/${APP}-${VER}-${abi}.apk"
          done
          ls -lh dist

      - name: Verify signature
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs dist/*-universal.apk | head -5
          else
            echo "apksigner not found — skipping signature print"
          fi

      - name: Remove signing material
        if: always()
        run: rm -f android/key.properties android/app/release.keystore

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-apks
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Signed release build of **${{ github.event.repository.name }}** — part of the [Secure Suite](https://github.com/MalicKAbdullah/secure-suite-core).

            Download the `arm64-v8a` APK for most modern phones, or the `universal` APK if unsure.
