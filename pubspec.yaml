name: vaultkey
description: Vaultly — an offline, encrypted password manager with vault health insights and scheduled backups.
version: 1.4.0+6
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Utilities
  uuid: ^4.4.0
  crypto: ^3.0.3
  intl: ^0.19.0
  path_provider: ^2.1.3

  # Biometric unlock
  local_auth: ^2.3.0

  # Direct platform dep — di.dart constructs FlutterSecureStorage
  flutter_secure_storage: ^9.2.2

  # Export / import
  share_plus: ^10.0.0
  file_picker: ^10.1.9
  url_launcher: ^6.3.0

  # Android SAF folder access for scheduled auto-backups
  saf_util: ^0.9.0
  saf_stream: ^0.10.0

  # Core packages
  core_crypto:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_crypto
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_storage:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_storage
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_security:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_security
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_theme:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_theme
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_ui:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_ui
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_backup:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_backup
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_notify:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_notify
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
  core_update:
    git:
      url: https://github.com/MalicKAbdullah/secure-suite-core.git
      path: core_update
      ref: 80ed81269968f90534bc2224e7be21e138f5d122
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  fake_async: ^1.3.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#059669"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
